<!DOCTYPE html>
<html>
<head>
    <title>Aliaslar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">🔗 Alias Listesi</h2>

<table class="table table-hover table-bordered">
    <thead class="table-success">
        <tr>
            <th>ID</th>
            <th>Intent</th>
            <th>Alias</th>
            <th>İşlem</th>
        </tr>
    </thead>
    <tbody>
        {% for a in aliases %}
        <tr>
            <td>{{ a[0] }}</td>
            <td>{{ a[1] }}</td>
            <td>{{ a[2] }}</td>
            <td>
                <a href="/edit-alias/{{ a[0] }}?user_id={{ selected_user_id }}" class="btn btn-sm btn-warning">Düzenle</a>
                <a href="/delete-alias/{{ a[0] }}" class="btn btn-sm btn-danger">Sil</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/admin?user_id={{ selected_user_id }}" class="btn btn-dark mb-3">
    ← Geri Dön
</a>

</body>
</html>

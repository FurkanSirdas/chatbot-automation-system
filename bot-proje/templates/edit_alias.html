<!DOCTYPE html>
<html>
<head>
    <title>Alias Güncelle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow-sm">
        <div class="card-body">

            <h3 class="mb-4">🔗 Alias Güncelle</h3>

            <form method="POST">
                <input type="hidden" name="user_id" value="{{ selected_user_id }}">
                <input 
                    type="text" 
                    name="text" 
                    class="form-control mb-3"
                    value="{{ alias[0] }}"
                >

                <button class="btn btn-success w-100">
                    Güncelle
                </button>
            </form>

            <a href="/aliases?user_id={{ selected_user_id }}" class="btn btn-secondary mt-3">
                ← Geri
            </a>

        </div>
    </div>

</div>

</body>
</html>

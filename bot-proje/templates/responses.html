<!DOCTYPE html>
<html>
<head>
    <title>Cevaplar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">💬 Cevap Listesi</h2>

<table class="table table-hover table-bordered">
    <thead class="table-warning">
        <tr>
            <th>ID</th>
            <th>Intent</th>
            <th>Cevap</th>
            <th>İşlem</th>
        </tr>
    </thead>
    <tbody>
        {% for r in responses %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>
                <a href="/edit-response/{{ r[0] }}?user_id={{ selected_user_id }}" class="btn btn-sm btn-warning">Düzenle</a>
                <a href="/delete-response/{{ r[0] }}" class="btn btn-sm btn-danger">Sil</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/admin?user_id={{ selected_user_id }}" class="btn btn-dark mb-3">
    ← Geri Dön
</a>

</body>
</html>
